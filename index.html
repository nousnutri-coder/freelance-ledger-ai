<!DOCTYPE html>
<html lang="es" class="">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FreelAissistPro - Gestión Financiera con IA</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round|Material+Icons+Outlined"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#064E3B",
                        "primary-hover": "#065F46",
                        "emerald-500": "#10b981",
                        "emerald-600": "#059669",
                        "emerald-800": "#065f46",
                        "emerald-900": "#064E3B",
                        "background-light": "#F0F2F5", // Darker gray for better contrast
                        "background-dark": "#0f172a",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#1e293b",
                        "card-light": "#FFFFFF",
                        "card-dark": "#1f2937",
                        "column-light": "#F1F5F9",
                        "column-dark": "#172033",
                    },
                    backgroundImage: {
                        'gradient-light': 'linear-gradient(135deg, #F0F2F5 0%, #E2E8F0 100%)', // Premium Light Gradient
                        'gradient-dark': 'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)',
                    },
                    fontFamily: {
                        sans: ["Inter", "Plus Jakarta Sans", "DM Sans", "sans-serif"],
                        display: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'xl': '0.75rem',
                        '2xl': '1rem',
                        '3xl': '1.5rem',
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)', // MUCH softer and deeper shadow
                        'card': '0 2px 8px -2px rgba(0,0,0,0.05), 0 0 1px rgba(0,0,0,0.05)',
                        'glow': '0 0 20px rgba(6, 78, 59, 0.2)',
                    }
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        @media print {
            @page {
                size: A4;
                margin: 10mm;
            }

            html,
            body {
                height: auto !important;
                overflow: visible !important;
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Ocultar elementos de UI */
            aside,
            header,
            .no-print,
            .chatbot-container,
            .fixed,
            button,
            select,
            .no-print-important,
            nav,
            .floating-chat {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
            }

            /* Forzar el despliegue del contenido para que no salga en blanco */
            #root,
            main,
            .flex-1,
            .overflow-y-auto,
            .h-screen,
            .flex {
                display: block !important;
                overflow: visible !important;
                height: auto !important;
                position: static !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                visibility: visible !important;
            }

            /* El área de cotización se vuelve el centro del documento */
            #print-area {
                display: block !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                border: none !important;
                box-shadow: none !important;
                background: white !important;
                visibility: visible !important;
            }

            #print-area * {
                visibility: visible !important;
                color-adjust: exact !important;
                -webkit-print-color-adjust: exact !important;
            }

            /* Fix para asegurar que los fondos de Tailwind se vean */
            .bg-emerald-900,
            .bg-primary {
                background-color: #064E3B !important;
            }

            .bg-slate-900 {
                background-color: #0f172a !important;
            }

            .bg-slate-50 {
                background-color: #f8fafc !important;
            }

            .text-red-500 {
                color: #ef4444 !important;
            }
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
    <link rel="stylesheet" href="/index.css">
</head>

<body
    class="bg-gradient-light dark:bg-background-dark text-gray-800 dark:text-gray-100 min-h-screen transition-colors duration-300 antialiased selection:bg-emerald-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
